<html>
    <!-- link rel="manifest" href="/manifest.json"/ -->
    <head>
        <script src="https://www.gstatic.com/firebasejs/4.8.0/firebase-app.js"></script>
        <script src="https://www.gstatic.com/firebasejs/4.8.0/firebase-messaging.js"></script>
        <script src="https://code.jquery.com/jquery-2.2.4.min.js"></script>
        <script src="notify_actions.js"></script>
        <title>Notify Firebase Cloud Notifications</title>
    </head>
    <body>
        <h1>Sample Notification Web Application</h1>

        <!-- --------------------------------------------------------------- -->
        <h2>Create Binding</h2>
        <form id="binding_form">
            <table>
                <tr>
                    <td>Identity:</td>
                    <td><input type="text" name="identity_field"></td>
                </tr>
                <tr>
                    <td><input type="button" onclick="GetMessagingToken()" value="Get Firebase FCM message token"></td>
                    <td style="height:60px"><span id="fcmToken"></span></td>
                </tr>
                <tr>
                    <td><input type="button" onclick="createBinding()" value="Create Twilio Notify binding"></td>
                    <td><span id="bindingSid"></span></td>
                </tr>
            </table>
        </form>

        <!-- --------------------------------------------------------------- -->
        <script>
            // firebase sample code snippets from https://firebase.google.com/docs/cloud-messaging/js/client
            // Initialize Firebase
            // tignotifyweb:
            var config = {
                apiKey: "AI...Q",
                projectId: "example",
                messagingSenderId: "7...6"
            };
            console.log('+ firebase.initializeApp(config), ' + config.projectId);
            //
            // Retrieve Firebase Messaging object.
            firebase.initializeApp(config);
            //
            // Listener for incomming notifications.
            firebase.messaging().onMessage(function (payload) {
                console.log('Message received. ', payload);
                alert(payload.data.twi_body);
            });
        </script>
    </body>
</html>
